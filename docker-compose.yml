version: '3.8'

services:
  # 백엔드 (DB는 Supabase 외부 연결)
  backend:
    build: ./backend
    container_name: fastapi_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env

  # 프론트엔드
  frontend:
    build: ./frontend
    container_name: react_frontend
    restart: always
    ports:
      - "3000:5173"
    stdin_open: true
